<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1565c0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Отчёт водителя</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="wrap">

    <header class="page-header">
      <span>🚛</span>
      <h1>Отчёт водителя</h1>
    </header>

    <form id="form" class="card" novalidate>

      <div class="field">
        <label for="search">Фамилия</label>
        <input id="search" type="text" inputmode="text"
               placeholder="Введите фамилию"
               autocomplete="off" autocorrect="off" spellcheck="false" required>
        <div id="suggestions" class="suggestions" hidden></div>
      </div>

      <div id="driver-info" class="driver-info" hidden>
        <div class="driver-name" id="driver-name"></div>
        <div class="driver-car" id="driver-car"></div>
      </div>

      <div class="field">
        <label for="box_count">Количество коробов</label>
        <input id="box_count" type="number" inputmode="numeric"
               min="1" max="9999" placeholder="0" required>
      </div>

      <p id="err" class="err" hidden></p>

      <button type="submit" id="btn">Отправить</button>

    </form>

    <div id="ok" class="card ok-card" hidden>
      <div class="checkmark">✓</div>
      <p>Данные сохранены</p>
    </div>

  </div>
  <script src="/app.js"></script>
</body>
</html>
